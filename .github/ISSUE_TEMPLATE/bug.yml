name: Bug
description: Something broken, missing, or behaving unexpectedly
title: "fix: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Be specific about what you saw vs. what you expected. Screenshots welcome.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Exactly what you saw. Error messages, weird rendering, wrong data — paste it all.
      placeholder: e.g. "Tool not found: studio" error when visiting /studio
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
      placeholder: e.g. Sanity Studio should load at /studio
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `npm run dev`
        2. Visit http://localhost:3000/studio
        3. See error

  - type: textarea
    id: files
    attributes:
      label: Likely broken in
      description: Where in the codebase is this probably happening?
      placeholder: |
        - sanity/sanity.config.ts
        - app/studio/[[...tool]]/page.tsx

  - type: dropdown
    id: environment
    attributes:
      label: Where does it happen?
      options:
        - Local dev only (localhost)
        - Production only (Vercel)
        - Both
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console errors or logs
      description: Open browser DevTools → Console and paste anything relevant.
      render: shell
