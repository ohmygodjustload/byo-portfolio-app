name: Feature
description: A new capability, improvement, or block type
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Fill in what you know. Leave anything blank that you haven't figured out yet — that's what the issue is for.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap. "Miranda can't do X without asking Drew" is a perfect answer.
      placeholder: e.g. Miranda can't add a credits list without a new block type
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should exist when this is done? Be as vague or specific as you want.
      placeholder: e.g. A new "credits" block type with fields for show name, role, director, year

  - type: textarea
    id: files
    attributes:
      label: Files likely involved
      description: Your best guess — helps you pick up where you left off.
      placeholder: |
        - sanity/schemas/blocks/credits.ts (new)
        - lib/types.ts (add CreditBlock type)
        - components/blocks/CreditsBlock.tsx (new)
        - components/blocks/BlockRenderer.tsx (register new block)

  - type: textarea
    id: acceptance
    attributes:
      label: Done when...
      description: Paste these as checkboxes. Each line becomes a checkbox in the issue.
      placeholder: |
        - [ ] Block appears as an option in Studio
        - [ ] Fields save and publish correctly
        - [ ] Renders correctly on the public site
        - [ ] TypeScript has no errors

  - type: textarea
    id: references
    attributes:
      label: Useful links or context
      description: Docs, similar issues, Sanity schema examples, etc.
